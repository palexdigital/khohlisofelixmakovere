<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Romanos</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a {
            color: inherit;
            text-decoration: none;
        }

        /* Layout Container */
        .wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 160px 1fr 160px;
            grid-template-rows: auto 1fr auto;
            grid-template-areas: 
                "header header header"
                "leftmain center rightmain"
                "footer footer footer";
            gap: 20px;
        }

        /* Header Construction */
        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .brand-nav h1 {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .brand-nav nav ul {
            list-style: none;
        }
        .brand-nav nav ul li {
            font-size: 13px;
            margin-bottom: 4px;
        }

        /* Left Column Construction */
        .left-sidebar {
            grid-area: leftmain;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .social-links {
            list-style: none;
        }
        .social-links li {
            font-size: 13px;
            margin-bottom: 12px;
        }

        /* Center Column Construction (Hero Banner Area) */
        .main-content {
            grid-area: center;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 20px;
        }
        .image-container {
            width: 100%;
            display: flex;
            justify-content: flex-end;
        }
        .hero-image {
            width: 100%;
            max-width: 440px;
            height: auto;
            display: block;
            object-fit: cover;
        }
        .text-container {
            padding-left: 20px;
        }
        .main-title {
            font-size: 64px;
            font-weight: bold;
            line-height: 1.05;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }
        
        /* Button Stack Styles */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
        }
        .custom-button {
            display: inline-block;
            padding: 10px 24px;
            background-color: #000000;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #000000;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .custom-button:hover {
            background-color: transparent;
            color: #000000;
        }

        /* Right Column Construction */
        .right-sidebar {
            grid-area: rightmain;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
        }

        /* Footer Construction */
        footer {
            grid-area: footer;
            margin-top: auto;
            padding-top: 60px;
        }
        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }
        .footer-copyright {
            font-size: 12px;
            text-align: center;
            flex-grow: 1;
        }
        
        /* Requested Developer Credits Addendum */
        .developer-credits {
            text-align: center;
            font-size: 12px;
            padding-top: 15px;
            border-top: 1px solid transparent;
        }

        /* Responsive Design Rules */
        @media (max-width: 900px) {
            .wrapper {
                grid-template-columns: 1fr;
                grid-template-areas: 
                    "header"
                    "center"
                    "leftmain"
                    "rightmain"
                    "footer";
                padding: 20px;
            }
            header {
                flex-direction: column;
                gap: 10px;
            }
            .main-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .image-container {
                justify-content: center;
            }
            .text-container {
                padding-left: 0;
                text-align: center;
            }
            .main-title {
                font-size: 48px;
            }
            .button-stack {
                align-items: center;
            }
            .right-sidebar {
                align-items: center;
                margin-top: 20px;
            }
            .footer-top {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="brand-nav">
                <h1>Sophia Romanos</h1>
                <nav>
                    <ul>
                        <li>Graduation Collection</li>
                        <li>About</li>
                    </ul>
                </nav>
            </div>
        </header>

        <aside class="left-sidebar">
            <ul class="social-links">
                <li><a href="#">LinkedIn</a></li>
                <li><a href="#">Facebook</a></li>
                <li><a href="#">Instagram</a></li>
                <li><a href="#">Twitter</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="image-container">
                <img src="image01.jpg" alt="Sophia Romanos Portfolio" class="hero-image">
            </div>
            <div class="text-container">
                <h2 class="main-title">Sophia<br>Romanos</h2>
                <div class="button-stack">
                    <a href="#" class="custom-button">View My Work</a>
                    <a href="#" class="custom-button">Button Two</a>
                    <a href="#" class="custom-button">Button Three</a>
                </div>
            </div>
        </main>

        <aside class="right-sidebar">
        </aside>

        <footer>
            <div class="footer-top">
                <ul class="social-links">
                    <li><a href="#">LinkedIn</a></li>
                    <li><a href="#">Facebook</a></li>
                    <li><a href="#">Instagram</a></li>
                    <li><a href="#">Twitter</a></li>
                </ul>
                
                <div class="footer-copyright"></div>
            </div>

            <div class="developer-credits">
                <a href="https://palexdigital.pages.dev/" target="_blank">Developed By paléXdigital</a>
            </div>
        </footer>
    </div>

</body>
</html>
